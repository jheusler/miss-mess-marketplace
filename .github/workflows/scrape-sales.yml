name: Daily Scrape
on:
  schedule:
    - cron: "0 13,20 * * *"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scraper-test.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: public/sales.json
          commit_message: Fresh data
